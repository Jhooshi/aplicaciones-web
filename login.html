<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroControl - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>🌱 AgroControl</h2>
                <p>Plataforma de Monitoreo Agrícola</p>
            </div>
            
            <form id="form-login">
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="ejemplo@agro.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary">Ingresar al Sistema</button>
            </form>
            
            <div class="login-footer">
                <small>Cuenta de demostración académica:<br><strong>admin@agro.com</strong> / <strong>12345</strong></small>
            </div>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
