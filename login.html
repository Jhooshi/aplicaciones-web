<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroControl - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-brand">
                    <span class="brand-mark" aria-hidden="true">
                        <span class="brand-leaf leaf-one"></span>
                        <span class="brand-leaf leaf-two"></span>
                    </span>
                    <h2>AgroControl</h2>
                </div>
                <p>Plataforma de Monitoreo Agrícola</p>
            </div>
            
            <form id="form-login">
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="ejemplo@agro.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary">Ingresar al Sistema</button>
            </form>
            
            <div class="login-footer">
                <small>Cuenta de demostración académica:<br><strong>admin@agro.com</strong> / <strong>12345</strong></small>
            </div>
        </div>
    </div>

    <script src="js/particles.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
